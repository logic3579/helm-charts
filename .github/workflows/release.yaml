name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
  workflow_dispatch:

concurrency:
  group: release-charts
  cancel-in-progress: false

env:
  PAGES_URL: https://logic3579.github.io/helm-charts
  RETENTION: 3

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: |
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ] && grep -q '^dependencies:' "$chart/Chart.yaml"; then
              helm dependency update "$chart"
            fi
          done

      - name: Lint application charts
        run: |
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ] && ! grep -q '^type: library' "$chart/Chart.yaml"; then
              helm lint "$chart"
            fi
          done

      - name: Package application charts
        run: |
          mkdir -p .packages
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ] && ! grep -q '^type: library' "$chart/Chart.yaml"; then
              helm package "$chart" -d .packages
            fi
          done

      - name: Push to GHCR (oci://ghcr.io/${{ github.repository_owner }}/helm-charts)
        continue-on-error: true
        env:
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "$GHCR_USER" --password-stdin
          for pkg in .packages/*.tgz; do
            [ -f "$pkg" ] || continue
            helm push "$pkg" "oci://ghcr.io/${GHCR_USER}/helm-charts"
          done
          helm registry logout ghcr.io || true

      - name: Push to Docker Hub (oci://registry-1.docker.io/${{ github.repository_owner }})
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        continue-on-error: true
        env:
          DOCKERHUB_USER: ${{ github.repository_owner }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | helm registry login registry-1.docker.io -u "$DOCKERHUB_USER" --password-stdin
          for pkg in .packages/*.tgz; do
            [ -f "$pkg" ] || continue
            helm push "$pkg" "oci://registry-1.docker.io/${DOCKERHUB_USER}"
          done
          helm registry logout registry-1.docker.io || true

      - name: Push to Quay (oci://quay.io/${{ github.repository_owner }})
        if: ${{ secrets.QUAY_TOKEN != '' }}
        continue-on-error: true
        env:
          QUAY_USER: ${{ github.repository_owner }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          echo "$QUAY_TOKEN" | helm registry login quay.io -u "$QUAY_USER" --password-stdin
          for pkg in .packages/*.tgz; do
            [ -f "$pkg" ] || continue
            helm push "$pkg" "oci://quay.io/${QUAY_USER}"
          done
          helm registry logout quay.io || true

      - name: Checkout gh-pages worktree
        run: |
          git fetch origin gh-pages
          git worktree add gh-pages origin/gh-pages

      - name: Publish new .tgz (preserve already-published versions)
        run: |
          for pkg in .packages/*.tgz; do
            [ -f "$pkg" ] || continue
            target="gh-pages/$(basename "$pkg")"
            if [ -e "$target" ]; then
              echo "skip existing: $(basename "$pkg")"
            else
              cp "$pkg" "$target"
              echo "added: $(basename "$pkg")"
            fi
          done

      - name: Prune to latest ${RETENTION} versions per chart
        run: |
          for chart_dir in charts/*/; do
            [ -f "$chart_dir/Chart.yaml" ] || continue
            grep -q '^type: library' "$chart_dir/Chart.yaml" && continue
            name=$(awk '/^name:/ {print $2; exit}' "$chart_dir/Chart.yaml")
            matches=()
            for tgz in gh-pages/${name}-*.tgz; do
              [ -e "$tgz" ] || continue
              bn=$(basename "$tgz" .tgz)
              # Strict match: chart name followed by '-' then a digit (semver).
              # Prevents prefix collisions (e.g. "kafka" vs "kafka-ui").
              if [[ "$bn" =~ ^${name}-[0-9] ]]; then
                matches+=("$tgz")
              fi
            done
            if [ "${#matches[@]}" -gt "$RETENTION" ]; then
              printf '%s\n' "${matches[@]}" | sort -V -r | tail -n +$((RETENTION + 1)) | while read -r f; do
                rm -f "$f"
                echo "pruned: $(basename "$f")"
              done
            fi
          done

      - name: Regenerate index.yaml
        run: |
          helm repo index gh-pages --url "${PAGES_URL}"

      - name: Sync static assets to gh-pages
        run: |
          cp index.html gh-pages/
          cp artifacthub-repo.yml gh-pages/

      - name: Commit and push gh-pages
        working-directory: gh-pages
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "nothing to publish"
            exit 0
          fi
          git add -A
          git commit -m "Publish chart updates"
          git push origin HEAD:gh-pages
