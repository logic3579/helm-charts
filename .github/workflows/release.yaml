name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
  workflow_dispatch:

concurrency:
  group: release-charts
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: |
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ] && grep -q 'dependencies:' "$chart/Chart.yaml"; then
              helm dependency update "$chart"
            fi
          done

      - name: Lint charts
        run: |
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ] && ! grep -q 'type: library' "$chart/Chart.yaml"; then
              helm lint "$chart"
            fi
          done

      - name: Package application charts
        run: |
          mkdir -p .cr-release-packages
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ] && ! grep -q 'type: library' "$chart/Chart.yaml"; then
              helm package "$chart" -d .cr-release-packages
            fi
          done

      - name: Check for new chart versions
        id: check-new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          has_new=false
          for pkg in .cr-release-packages/*.tgz; do
            [ -f "$pkg" ] || continue
            name=$(helm show chart "$pkg" | grep '^name:' | awk '{print $2}')
            version=$(helm show chart "$pkg" | grep '^version:' | awk '{print $2}')
            if ! gh release view "${name}-${version}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
              has_new=true
              break
            fi
          done
          echo "has_new=$has_new" >> $GITHUB_OUTPUT

      - name: Run chart-releaser
        if: steps.check-new.outputs.has_new == 'true'
        continue-on-error: true  # chart-releaser-action v1.7.0 has a known latest_tag bug that errors after successful release
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_packaging: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages content
        run: |
          mkdir -p ./public
          cp index.html ./public/
          cp artifacthub-repo.yml ./public/
          git fetch origin gh-pages 2>/dev/null || true
          git show origin/gh-pages:index.yaml > ./public/index.yaml 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    name: Deploy
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
