# -- Number of pod replicas
replicaCount: 1

# -- Container image configuration
image:
  # -- Image repository
  repository: cars10/elasticvue
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (defaults to .Chart.AppVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Elasticvue settings
elasticvue:
  # -- Pre-configured Elasticsearch / OpenSearch clusters. Rendered as a JSON
  # array and injected into the ELASTICVUE_CLUSTERS env var at startup.
  # Each cluster supports: name, uri, username, password, apiKey (and a few
  # AWS-IAM fields — see upstream docs).
  # Example:
  #   - name: prod
  #     uri: http://elasticsearch.es.svc:9200
  #     username: viewer
  #     password: changeme
  # Leave empty to let users configure clusters in the browser at runtime.
  clusters: []
  # -- Use an existing Secret to supply ELASTICVUE_CLUSTERS (key: ELASTICVUE_CLUSTERS).
  # Mutually exclusive with `clusters` (the secret wins if both are set).
  # Use this in production to keep cluster credentials out of plaintext values.
  existingSecret: ""

# -- Service account configuration
serviceAccount:
  # -- Whether to create a service account
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account (generated if not set)
  name: ""
  # -- Mount the service account token into pods (elasticvue does not need API access)
  automountServiceAccountToken: false

# -- Annotations to add to pods
podAnnotations: {}

# -- Labels to add to pods
podLabels: {}

# -- Pod-level security context.
# Note: the upstream image is based on nginxinc/nginx-unprivileged (UID 101).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101

# -- Container-level security context.
# Note: readOnlyRootFilesystem is false because the startup script writes
# /usr/share/nginx/html/api/default_clusters.json when ELASTICVUE_CLUSTERS is set,
# and nginx writes temp files under /var/cache/nginx and /var/run.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Service port (also used as the container port)
  port: 8080

# -- Resource requests and limits (elasticvue is a tiny nginx-served SPA)
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

# -- Liveness probe (TCP — upstream image has no /health endpoint)
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

# -- Readiness probe (TCP)
readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Horizontal Pod Autoscaler configuration
autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage (optional)
  # targetMemoryUtilizationPercentage: 80

# -- Additional volumes to add to the pod
volumes: []

# -- Additional volume mounts for the container
volumeMounts: []

# -- Extra environment variables (list of name/value pairs).
# Use this for arbitrary overrides not covered by the elasticvue.* block.
env: []

# -- Extra environment variable sources (configMapRef / secretRef)
envFrom: []

# -- ConfigMap configuration
configMap:
  # -- Create a ConfigMap
  enabled: false
  # -- ConfigMap key-value data
  data: {}

# -- Secret configuration
# WARNING: values are stored as plaintext and base64-encoded at render time.
# For production secrets, use External Secrets Operator (ESO) or Sealed Secrets instead.
secret:
  # -- Create a Secret
  enabled: false
  # -- Secret key-value data (values will be base64-encoded)
  data: {}

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Istio VirtualService configuration
virtualservice:
  # -- Enable VirtualService
  enabled: false
  # -- Istio gateway references
  gateways: []
    # - istio-ingress/internal-gateway
  # -- VirtualService hostnames
  hosts: []
    # - elasticvue.example.com
  # -- Destination port (defaults to service.port)
  port: ""

# -- PodDisruptionBudget configuration
podDisruptionBudget:
  # -- Enable PDB
  enabled: false
  # -- Minimum number of available pods
  minAvailable: 1
  # -- Maximum number of unavailable pods (mutually exclusive with minAvailable)
  # maxUnavailable: 1
