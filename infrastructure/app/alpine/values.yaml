# -- Number of pod replicas
replicaCount: 1

# -- Container image configuration
image:
  # -- Image repository (official Docker Hub _/alpine)
  repository: alpine
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (defaults to .Chart.AppVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# -- Container command — runs a minimal BusyBox `nc` HTTP responder loop
# so the pod has a listening socket on `service.port` and probes pass.
# Replace with your real backend command in production.
command:
  - sh
  - -c
  - |
    while true; do
      echo -e "HTTP/1.1 200 OK\r\nContent-Length: 17\r\n\r\nhello from alpine" | nc -l -p 8080;
    done
# -- Container args (unused; full command lives in `command` above).
args: []

# -- Service account configuration
serviceAccount:
  # -- Whether to create a service account
  create: true
  # AWS IRSA:                eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/alpine-role
  # GCP Workload Identity:   iam.gke.io/gcp-service-account: alpine@PROJECT_ID.iam.gserviceaccount.com
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account (generated if not set)
  name: ""
  # -- Mount the service account token into pods (example app needs no API access)
  automountServiceAccountToken: false

# -- Annotations to add to pods
podAnnotations: {}

# -- Labels to add to pods
podLabels: {}

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Service port — must match the nc -l -p target in `command`
  port: 8080

# -- Resource requests and limits (BusyBox nc is tiny)
resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi

# -- Liveness probe (TCP — nc is dumb, no HTTP semantics worth probing)
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

# -- Readiness probe (TCP)
readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 2
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Horizontal Pod Autoscaler configuration
autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage (optional)
  # targetMemoryUtilizationPercentage: 80

# -- Additional volumes to add to the pod.
# Provide a writable /tmp for the nc loop even with readOnlyRootFilesystem.
volumes:
  - name: tmp
    emptyDir: {}

# -- Additional volume mounts for the container.
volumeMounts:
  - name: tmp
    mountPath: /tmp

# -- Extra environment variables (list of name/value pairs).
env: []

# -- Extra environment variable sources (configMapRef / secretRef)
envFrom: []

# -- ConfigMap configuration
configMap:
  # -- Create a ConfigMap
  enabled: false
  # -- ConfigMap key-value data
  data: {}

# -- Secret configuration
# WARNING: values are stored as plaintext and base64-encoded at render time.
# For production secrets, use External Secrets Operator (ESO) or Sealed Secrets instead.
secret:
  # -- Create a Secret
  enabled: false
  # -- Secret key-value data (values will be base64-encoded)
  data: {}

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Istio VirtualService configuration
virtualservice:
  # -- Enable VirtualService
  enabled: false
  # -- Istio gateway references
  gateways: []
    # - istio-ingress/internal-gateway
  # -- VirtualService hostnames
  hosts: []
    # - alpine.example.com
  # -- Destination port (defaults to service.port)
  port: ""

# -- PodDisruptionBudget configuration
podDisruptionBudget:
  # -- Enable PDB
  enabled: false
  # -- Minimum number of available pods
  minAvailable: 1
  # -- Maximum number of unavailable pods (mutually exclusive with minAvailable)
  # maxUnavailable: 1
