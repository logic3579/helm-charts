## prometheus-mysql-exporter — exposes MySQL replication / InnoDB / query metrics
## on :9104. Connects to a MySQL endpoint configured below.

replicaCount: 1

image:
  registry: quay.io
  repository: prometheus/mysqld-exporter
  tag: ""  # inherits appVersion (v0.19.0 at chart 2.13.1)
  pullPolicy: IfNotPresent

# MySQL connection. For non-trivial environments, use `existingPasswordSecret`
# (recommended) or `existingConfigSecret` (full my.cnf) instead of inline `pass`.
mysql:
  host: "mysql.database.svc.cluster.local"
  port: 3306
  user: "exporter"
  # Inline password — fine for dev, replace with a Secret in production.
  pass: "<REPLACE_ME>"
  db: ""

  # Production-friendly: store the password in a Kubernetes Secret and reference it.
  # The chart prefers existingPasswordSecret over `pass` when both are set.
  existingPasswordSecret:
    name: ""
    key: ""

  # Alternatively: store the entire my.cnf in a Secret.
  # existingConfigSecret:
  #   name: ""
  #   key: ""

# Service exposes :9104. Annotations make the prometheus chart's `kubernetes-pods`
# job auto-discover it without a ServiceMonitor.
service:
  type: ClusterIP
  port: 9104
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9104"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector:
  tier: mgmt

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Bundled ServiceMonitor / PrometheusRule off — annotation-driven scrape only.
serviceMonitor:
  enabled: false
prometheusRule:
  enabled: false

# Collector toggles — chart default enables most useful ones (innodb, info_schema).
# Override here if you need to disable a heavy collector.
collectors: {}
