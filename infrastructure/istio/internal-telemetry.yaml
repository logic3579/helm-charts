apiVersion: v1
kind: Service
metadata:
  name: internal-telemetry
  namespace: istio-ingress
  labels:
    app: internal-istio-ingress
spec:
  type: ClusterIP
  selector:
    app: internal-istio-ingress
  ports:
    - name: http-envoy-prom
      port: 15020
      protocol: TCP
      targetPort: 15020
---
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: internal-telemetry
  namespace: istio-ingress
spec:
  selector:
    matchLabels:
      app: internal-istio-ingress
  metrics:
    - providers:
        - name: prometheus
      overrides:
        - match:
            metric: REQUEST_COUNT
          tagOverrides:
            request_host:
              operation: UPSERT
              value: "request.host"
        - match:
            metric: REQUEST_DURATION
          tagOverrides:
            request_host:
              operation: UPSERT
              value: "request.host"
        - match:
            metric: REQUEST_SIZE
          tagOverrides:
            request_host:
              operation: UPSERT
              value: "request.host"
        - match:
            metric: RESPONSE_SIZE
          tagOverrides:
            request_host:
              operation: UPSERT
              value: "request.host"
