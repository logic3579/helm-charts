# Values for logic-charts/elasticvue deployed on the mgmt cluster.
# Clusters can be configured in two ways:
#   1. Inline below (plaintext — fine when there's no ES auth)
#   2. From a Secret: set `elasticvue.existingSecret` to a Secret whose
#      `ELASTICVUE_CLUSTERS` key holds the full JSON array. Use this in
#      production to keep credentials out of plaintext values.
# Leave both empty to let users configure clusters in the browser UI.

elasticvue:
  clusters: []
    # - name: mgmt
    #   uri: http://elasticsearch.es.svc:9200
    #   username: viewer
    #   password: changeme
  existingSecret: ""

# VirtualService is enabled here instead of via a standalone manifest.
virtualservice:
  enabled: true
  gateways:
    - istio-ingress/external-gateway
  hosts:
    - elasticvue.example.com
