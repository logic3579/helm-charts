# Istio VirtualService for kafka-ui on the mgmt cluster.
#
# The upstream kafbat/kafka-ui chart only ships an Ingress template, but this
# repo's convention is to route via Istio. Apply this after the helm install:
#   kubectl apply -f kafka-ui-virtualservice.yaml
#
# Edit <PLACEHOLDER> tokens in place before applying.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: kafka-ui
  namespace: mgmt
spec:
  gateways:
    - istio-ingress/external-gateway
  hosts:
    - kafka-ui.example.com
  http:
    - route:
        - destination:
            host: kafka-ui.mgmt.svc.cluster.local
            port:
              number: 80
