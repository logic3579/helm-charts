# Values for logic-charts/kafka-ui deployed on the mgmt cluster.
# Edit <PLACEHOLDER> tokens in place before running `helm upgrade --install`.

kafkaClusters:
  - name: mgmt
    bootstrapServers: "<PLACEHOLDER>:9092"
    readonly: false

# VirtualService is enabled here instead of via a standalone manifest.
virtualservice:
  enabled: true
  gateways:
    - istio-ingress/external-gateway
  hosts:
    - kafka-ui.example.com
