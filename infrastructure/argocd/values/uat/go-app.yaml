# UAT overrides for charts/go-app
# Layered on top of charts/go-app/values.yaml by the ApplicationSet.

replicaCount: 1

image:
  # repository: <REGISTRY>/<NAMESPACE>/go-app
  tag: "uat"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

