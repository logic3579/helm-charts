# UAT overrides for charts/python-app
# Layered on top of charts/python-app/values.yaml by the ApplicationSet.

replicaCount: 1

image:
  # repository: <REGISTRY>/<NAMESPACE>/python-app
  tag: "uat"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

