# Prod overrides for charts/python-app
# Layered on top of charts/python-app/values.yaml by the ApplicationSet.

replicaCount: 3

image:
  # repository: <REGISTRY>/<NAMESPACE>/python-app
  tag: "1.0.0"  # pin to a released version, never use "latest"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

