# Prod overrides for charts/go-app
# Layered on top of charts/go-app/values.yaml by the ApplicationSet.

replicaCount: 3

image:
  # repository: <REGISTRY>/<NAMESPACE>/go-app
  tag: "1.0.0"  # pin to a released version, never use "latest"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

