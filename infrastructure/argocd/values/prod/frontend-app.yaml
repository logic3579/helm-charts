# Prod overrides for charts/frontend-app
# Layered on top of charts/frontend-app/values.yaml by the ApplicationSet.

replicaCount: 3

image:
  # repository: <REGISTRY>/<NAMESPACE>/frontend-app
  tag: "1.0.0"  # pin to a released version, never use "latest"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

