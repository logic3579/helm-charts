# Mgmt overrides for charts/nightingale
# Layered on top of charts/nightingale/values.yaml by the ApplicationSet.
#
# This file mirrors infrastructure/observability/nightingale/nightingale-values.yaml
# (the manual `helm install` reference) — when ArgoCD is the source of truth
# for nightingale, this is the authoritative override. Routing is handled
# out-of-band via the Istio VirtualService at
# infrastructure/observability/nightingale/nightingale-virtualservice.yaml.

expose:
  type: clusterIP

externalURL: https://nightingale.example.com

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    database:
      accessMode: ReadWriteOnce
      size: 50Gi
    redis:
      accessMode: ReadWriteOnce
      size: 2Gi
    prometheus:
      accessMode: ReadWriteOnce
      size: 50Gi

# JWT signing key. Replace with a 32+ char random string (e.g. `openssl rand -hex 32`).
# In production, prefer External Secrets Operator / Sealed Secrets over plaintext.
secretKey: "REPLACE_ME_8f3a1c9d4b6e2f5a7c0d9e1b3a4f6c8d"

nginx:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector:
    tier: mgmt

database:
  type: internal
  internal:
    username: "root"
    # MySQL root password. Replace with a strong random string before deploying.
    password: "REPLACE_ME_db_2c7e9a1f4d8b3e6c5a0d2f9b1e4c7a3d"
    shmSizeLimit: 512Mi
    nodeSelector:
      tier: mgmt
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

redis:
  type: internal
  internal:
    nodeSelector:
      tier: mgmt
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

prometheus:
  type: internal
  internal:
    nodeSelector:
      tier: mgmt
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

categraf:
  type: internal
  internal:
    nodeSelector:
      tier: mgmt
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # "unix:///var/run/docker.sock" is default; for containerd / cri-o, leave empty.
    docker_socket: ""

n9e:
  type: internal
  internal:
    replicas: 1
    nodeSelector:
      tier: mgmt
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    ibexEnable: false
    ibexPort: "20090"
  victoriaMetrics:
    enabled: false
