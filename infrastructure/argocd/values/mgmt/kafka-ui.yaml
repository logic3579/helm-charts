# Mgmt overrides for the upstream kafbat/kafka-ui chart.
# Layered on top of the chart's own values.yaml by the multi-source Application
# at infrastructure/argocd/applications/kafka-ui.yaml.
#
# A single kafka-ui instance runs on the mgmt cluster and monitors kafka
# clusters in mgmt / uat / prod. Each cluster's bootstrap servers must be
# resolvable from mgmt (cross-cluster networking, peering, or LB).

replicaCount: 1

image:
  registry: ghcr.io
  repository: kafbat/kafka-ui
  pullPolicy: IfNotPresent
  # tag: ""   # defaults to chart appVersion (v1.5.0 in chart 1.6.4)

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Multi-cluster kafka monitoring. Bootstrap servers below are placeholders —
# replace with cross-cluster-reachable addresses (e.g. LB DNS, service mesh
# hostnames, or peered private IPs).
yamlApplicationConfig:
  auth:
    type: LOGIN_FORM
  spring:
    security:
      user:
        # Username only — password comes from a Secret via envs.secretMappings below.
        name: admin
  kafka:
    clusters:
      - name: mgmt
        bootstrapServers: "<MGMT_KAFKA_BOOTSTRAP>:9092"
        # schemaRegistry: "http://<MGMT_SCHEMA_REGISTRY>:8081"
        readOnly: false
      - name: uat
        bootstrapServers: "<UAT_KAFKA_BOOTSTRAP>:9092"
        # schemaRegistry: "http://<UAT_SCHEMA_REGISTRY>:8081"
        readOnly: false
      - name: prod
        bootstrapServers: "<PROD_KAFKA_BOOTSTRAP>:9092"
        # schemaRegistry: "http://<PROD_SCHEMA_REGISTRY>:8081"
        readOnly: true

# Pull login password from a pre-existing Secret in the kafka-ui namespace
# (recommended: managed by ESO or Sealed Secrets). The Secret must contain
# the key referenced below.
envs:
  secretMappings:
    SPRING_SECURITY_USER_PASSWORD:
      name: kafka-ui-auth
      keyName: password

ingress:
  enabled: false

service:
  type: ClusterIP
  port: 80
