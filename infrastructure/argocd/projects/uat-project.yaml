# ArgoCD AppProject for UAT Environment
# This project manages all applications deployed to the UAT GKE cluster
#
# Usage:
#   # Edit the file to replace placeholders with actual values
#   kubectl apply -f uat-project.yaml

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: example-uat
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  description: "UAT Environment - Auto-sync enabled"

  # Source repositories - replace with your repo URL
  sourceRepos:
    - "https://github.com/<YOUR_ORG>/<YOUR_REPO>.git"

  # Destination cluster - use cluster name from cluster secret
  destinations:
    - name: uat-cluster
      namespace: "*"

  # Cluster resources allowed to be deployed
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  # Namespace resources allowed
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # Roles for this project
  #
  # NOTE: No project-scoped `admin` role — devops-team is bound to the global
  # role:admin in argocd-values.yaml, which already grants superuser on
  # everything (including this project). Project-scoped admin would be dead
  # code.
  roles:
    # Developer role — adds sync rights for UAT apps on top of the global
    # role:readonly that all authenticated users already have.
    - name: developer
      description: "View and sync UAT applications"
      policies:
        - p, proj:example-uat:developer, applications, get, example-uat/*, allow
        - p, proj:example-uat:developer, applications, sync, example-uat/*, allow
        - p, proj:example-uat:developer, logs, get, example-uat/*, allow
      groups:
        - developer-team

  # Orphaned resources monitoring
  orphanedResources:
    warn: true
    ignore:
      # Istio auto-generated certificates
      - kind: ConfigMap
        name: "istio-ca-*"
      # Manually managed pull secret
      - kind: Secret
        name: "github-registry-secret"
      # Manually managed ServiceAccount
      - kind: ServiceAccount
        name: "app"
