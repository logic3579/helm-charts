# ArgoCD AppProject for Prod Environment
# This project manages all applications deployed to the Prod GKE cluster
#
# Usage:
#   # Edit the file to replace placeholders with actual values
#   kubectl apply -f prod-project.yaml

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: example-prod
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  description: "Production Environment - Manual sync only (PR approval required)"

  # Source repositories - replace with your repo URL
  sourceRepos:
    - "https://github.com/<YOUR_ORG>/<YOUR_REPO>.git"

  # Destination cluster - use cluster name from cluster secret
  destinations:
    - name: prod-cluster
      namespace: "*"

  # Cluster resources allowed to be deployed
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  # Namespace resources allowed
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # No project-scoped roles — all access for this project is covered by the
  # GLOBAL RBAC in argocd-values.yaml:
  #   - devops-team gets superuser via `g, devops-team, role:admin`.
  #   - developer-team gets read-only via `policy.default: role:readonly`.
  # Production sync is intentionally NOT granted to developer-team — Prod
  # changes must be triggered manually by devops-team (or through PR-driven
  # automation), matching the ApplicationSet's auto-sync=disabled posture.

  # Orphaned resources monitoring
  orphanedResources:
    warn: true
    ignore:
      # Istio auto-generated certificates
      - kind: ConfigMap
        name: "istio-ca-*"
      # Manually managed pull secret
      - kind: Secret
        name: "github-registry-secret"
      # Manually managed ServiceAccount
      - kind: ServiceAccount
        name: "app"

  # Signature keys for verified commits (optional)
  # signatureKeys:
  #   - keyID: <GPG_KEY_ID>
