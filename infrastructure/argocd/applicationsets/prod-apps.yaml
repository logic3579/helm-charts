# ApplicationSet for Prod Environment
#
# Auto-discovers every chart under `charts/` (excluding the `common` library
# chart) and deploys it to the Prod cluster.
#
# Layout (multi-source):
#   - Chart source:   charts/<app>/values.yaml                                 (defaults baked into the chart)
#   - Env overrides:  infrastructure/argocd/values/prod/<app>.yaml             (deployment-specific values)
#
# Missing override files are tolerated (`ignoreMissingValueFiles: true`) so a
# new chart can be added without immediately requiring a Prod override file.
#
# NOTE: Auto-sync is DISABLED — changes are applied only after a manual sync.
#
# Usage:
#   # Edit the file to replace placeholders with actual values
#   kubectl apply -f prod-apps.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: example-prod-apps
  namespace: argocd
spec:
  # Go templates for more flexibility
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  # Generator: Git Directory - auto-discover all helm charts
  generators:
    - git:
        repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
        revision: main
        directories:
          # Include every chart directly under charts/
          - path: charts/*
          # Exclude the `common` library chart — it has `type: library` and is
          # consumed by the other charts via file://../common; ArgoCD cannot
          # deploy it as a standalone Application.
          - path: charts/common
            exclude: true

  # Application template
  template:
    metadata:
      # App name: <directory-name>-prod
      name: "{{ .path.basename }}-prod"
      namespace: argocd
      labels:
        environment: prod
        app.kubernetes.io/part-of: example
      finalizers:
        - argocd.argoproj.io/resources-finalizer
      # Slack notifications (optional)
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-sync-failed.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-health-degraded.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-sync-running.slack-webhook: ""

    spec:
      # Project reference
      project: example-prod

      # Multi-source: chart source + values-only ref
      sources:
        # 1) Chart source — ArgoCD renders this with Helm
        - repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
          targetRevision: main
          path: "{{ .path.path }}"
          helm:
            valueFiles:
              # Chart defaults (relative to the chart path)
              - values.yaml
              # Env-specific override (resolved via the $values ref source below)
              - $values/infrastructure/argocd/values/prod/{{ .path.basename }}.yaml
            # Tolerate charts that don't yet have a Prod override file
            ignoreMissingValueFiles: true
        # 2) Values ref — provides the `$values` prefix used above. This source
        #    is NOT rendered; it only resolves paths for valueFiles lookups.
        - repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
          targetRevision: main
          ref: values

      # Destination: Prod cluster (use cluster name from cluster secret)
      destination:
        name: prod-cluster
        namespace: <TARGET_NAMESPACE>

      # Sync policy: MANUAL for Production environment
      # Auto-sync is intentionally disabled
      syncPolicy:
        # NO automated sync for production!
        # automated: null  # This is the default

        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      # Ignore differences for certain fields
      ignoreDifferences:
        # Ignore replicas managed by HPA
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        # Ignore service account token secrets
        - group: ""
          kind: ServiceAccount
          jsonPointers:
            - /secrets

      # Revision history limit
      revisionHistoryLimit: 10
