# ApplicationSet for UAT Environment
#
# Auto-discovers every example app under `infrastructure/app/` (excluding
# the `common` library chart) and deploys it to the UAT cluster.
#
# Each app provides its own env-specific values colocated with the chart:
#   - infrastructure/app/<name>/values.yaml         (chart defaults)
#   - infrastructure/app/<name>/values-uat.yaml     (uat override — required)
#
# Both files are passed to helm in order. `ignoreMissingValueFiles: false`
# because each app is expected to ship its env override; if a new app is
# added without a uat override it should fail loudly rather than silently
# fall back to defaults.
#
# Note: publishable charts under `charts/` are NOT deployed here — they
# either ship via the gh-pages registry / OCI to external consumers, or
# are wired to mgmt as explicit Applications under
# `infrastructure/argocd/applications/`.
#
# Usage:
#   # Edit the file to replace placeholders with actual values
#   kubectl apply -f uat-apps.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: example-uat-apps
  namespace: argocd
spec:
  # Go templates for more flexibility
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  # Generator: Git Directory — auto-discover every example app.
  generators:
    - git:
        repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
        revision: main
        directories:
          # Include every app directly under infrastructure/app/
          - path: infrastructure/app/*
          # Exclude the `common` library chart — it has `type: library` and
          # is consumed by the other apps via file://../common; ArgoCD
          # cannot deploy it as a standalone Application.
          - path: infrastructure/app/common
            exclude: true

  # Application template
  template:
    metadata:
      # App name: <directory-name>-uat
      name: "{{ .path.basename }}-uat"
      namespace: argocd
      labels:
        environment: uat
        app.kubernetes.io/part-of: example
      finalizers:
        - argocd.argoproj.io/resources-finalizer
      # Slack notifications (optional)
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-sync-failed.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-health-degraded.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-sync-running.slack-webhook: ""

    spec:
      # Project reference
      project: example-uat

      # Single source — values colocated with the chart so no `$values` ref needed.
      source:
        repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
        targetRevision: main
        path: "{{ .path.path }}"
        helm:
          valueFiles:
            # Chart defaults
            - values.yaml
            # UAT-specific override (colocated, relative to the chart path)
            - values-uat.yaml
          # Colocated override is required — fail loudly if missing.
          ignoreMissingValueFiles: false

      # Destination: UAT cluster (use cluster name from cluster secret).
      # Namespace = chart directory name (e.g. `infrastructure/app/nginx` -> ns `nginx`),
      # symmetric with the per-component mgmt Applications. Auto-created via
      # `CreateNamespace=true` below.
      destination:
        name: uat-cluster
        namespace: "{{ .path.basename }}"

      # Sync policy: Automated for UAT environment
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false

        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      # Ignore differences for certain fields
      ignoreDifferences:
        # Ignore replicas managed by HPA
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        # Ignore service account token secrets
        - group: ""
          kind: ServiceAccount
          jsonPointers:
            - /secrets
