# ApplicationSet for Mgmt Environment
#
# Mgmt is the cluster ArgoCD itself runs on, used for shared infrastructure
# components that should NOT be deployed per-env to UAT/Prod (e.g. an org-wide
# Nightingale monitoring stack).
#
# Unlike the UAT/Prod ApplicationSets, this one does NOT auto-discover every
# chart under `charts/` — it EXPLICITLY lists the shared components that
# belong on the mgmt cluster. Adding a new mgmt-tier component is a
# deliberate act: append another `path:` entry below.
#
# Layout (multi-source):
#   - Chart source:   charts/<app>/values.yaml                                 (defaults baked into the chart)
#   - Env overrides:  infrastructure/argocd/values/mgmt/<app>.yaml             (deployment-specific values)
#
# Missing override files are tolerated (`ignoreMissingValueFiles: true`).
#
# Each shared component lands in its OWN namespace named after the chart
# (`{{ .path.basename }}`) rather than a single shared namespace.
#
# Usage:
#   # Edit the file to replace placeholders with actual values
#   kubectl apply -f mgmt-apps.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: example-mgmt-apps
  namespace: argocd
spec:
  # Go templates for more flexibility
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  # Generator: Git Directory - explicit allow-list (NOT a wildcard)
  generators:
    - git:
        repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
        revision: main
        directories:
          # Shared mgmt-tier components — append more `path:` entries here as
          # new shared infra charts are added under `charts/`.
          - path: charts/nightingale

  # Application template
  template:
    metadata:
      # App name: <directory-name>-mgmt
      name: "{{ .path.basename }}-mgmt"
      namespace: argocd
      labels:
        environment: mgmt
        app.kubernetes.io/part-of: example
      finalizers:
        - argocd.argoproj.io/resources-finalizer
      # Slack notifications (optional)
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-sync-failed.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-health-degraded.slack-webhook: ""
        notifications.argoproj.io/subscribe.on-sync-running.slack-webhook: ""

    spec:
      # Project reference
      project: example-mgmt

      # Multi-source: chart source + values-only ref
      sources:
        # 1) Chart source — ArgoCD renders this with Helm
        - repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
          targetRevision: main
          path: "{{ .path.path }}"
          helm:
            valueFiles:
              # Chart defaults (relative to the chart path)
              - values.yaml
              # Env-specific override (resolved via the $values ref source below)
              - $values/infrastructure/argocd/values/mgmt/{{ .path.basename }}.yaml
            # Tolerate charts that don't yet have a Mgmt override file
            ignoreMissingValueFiles: true
        # 2) Values ref — provides the `$values` prefix used above. This source
        #    is NOT rendered; it only resolves paths for valueFiles lookups.
        - repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
          targetRevision: main
          ref: values

      # Destination: Mgmt cluster (use cluster name from cluster secret)
      # Each shared component lands in its OWN namespace (the chart directory
      # name) — e.g. `charts/nightingale` -> namespace `nightingale`.
      destination:
        name: mgmt-cluster
        namespace: "{{ .path.basename }}"

      # Sync policy: Automated for Mgmt environment
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false

        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true

        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      # Ignore differences for certain fields
      ignoreDifferences:
        # Ignore replicas managed by HPA
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        # Ignore service account token secrets
        - group: ""
          kind: ServiceAccount
          jsonPointers:
            - /secrets
