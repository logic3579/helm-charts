# ArgoCD Cluster Secret for Mgmt GKE Cluster (in-cluster registration)
#
# ArgoCD runs on the Mgmt cluster itself, so this secret registers the local
# Kubernetes API as a NAMED destination ("mgmt-cluster") for naming symmetry
# with the UAT / Prod cluster secrets. The application controller falls back
# to its own in-cluster ServiceAccount token when no `bearerToken` or
# `execProviderConfig` is supplied — no Workload Identity setup is required.
#
# Architecture:
#   ArgoCD runs on Mgmt cluster (project: example-mgmt)
#   ArgoCD manages Mgmt cluster (project: example-mgmt) directly (in-cluster)
#
# Note: ArgoCD also ships with a built-in `in-cluster` destination
# (server: https://kubernetes.default.svc). Registering the same URL via this
# secret simply provides an alternative name (`mgmt-cluster`) that mirrors
# the UAT / Prod naming convention used by the ApplicationSets and AppProject.

---
apiVersion: v1
kind: Secret
metadata:
  name: mgmt-cluster-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    environment: mgmt
type: Opaque
stringData:
  name: mgmt-cluster
  server: "https://kubernetes.default.svc"
  config: |
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
