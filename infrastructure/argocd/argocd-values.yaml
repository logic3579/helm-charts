# ArgoCD Helm Chart Values
# Chart: argo/argo-cd
# Documentation: https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd

## Global settings
global:
  # Domain for ArgoCD UI
  domain: argocd.example.com
  nodeSelector:
    kubernetes.io/os: linux
    tier: mgmt

## GKE Workload Identity - Service Account Annotations
## GSA: argocd-sa@example-mgmt.iam.gserviceaccount.com   # GSA lives in the Mgmt project
## Bound to KSA via: example-mgmt.svc.id.goog[argocd/argocd-application-controller]

## ArgoCD Server
server:
  # Service configuration - ClusterIP for Istio integration
  service:
    type: ClusterIP
    servicePortHttp: 80
    servicePortHttps: 443

  # TLS terminated by Istio gateway; requires Istio PeerAuthentication STRICT mTLS
  # on the argocd namespace to ensure in-mesh traffic is encrypted.
  extraArgs:
    - --insecure

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80

## ArgoCD Repository Server
repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

## ArgoCD Application Controller
controller:
  # Workload Identity: bind KSA to GSA for accessing remote GKE clusters
  serviceAccount:
    annotations:
      iam.gke.io/gcp-service-account: argocd-sa@example-mgmt.iam.gserviceaccount.com

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Metrics for Prometheus
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false # Enable if using Prometheus Operator

## Redis (HA mode)
redis:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Redis HA (optional - enable for production)
redis-ha:
  enabled: false # Set to true for HA Redis

## Dex (SSO - optional)
dex:
  enabled: false # Enable for SSO integration

## Notifications Controller
notifications:
  enabled: true

  # ArgoCD URL for notification links
  argocdUrl: https://argocd.example.com

  # Resource limits
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # Notification services will be configured via ConfigMap/Secret
  # See notifications/configmap.yaml and notifications/secret.yaml.template

## ArgoCD Configs
configs:
  # ConfigMap settings
  cm:
    # Enable Helm support
    helm.enabled: "true"

    # Application status badge
    statusbadge.enabled: "true"

    # Resource tracking method
    resource.tracking.method: annotation

    # Timeout for Helm operations
    timeout.reconciliation: 180s

    # Admin account enabled
    admin.enabled: "true"

    # URL for ArgoCD
    url: https://argocd.example.com

    # Additional local accounts
    # Format: accounts.<name>: <capabilities>
    # Capabilities: login, apiKey
    accounts.viewer: login

  # Parameters - increase limits for large repos
  params:
    # Repo server parallelism
    reposerver.parallelism.limit: 10

    # Application resync period
    controller.app.resync.period: 180

    # Enable gzip compression
    server.enable.gzip: "true"

  # RBAC Configuration
  #
  # Layered model:
  #   - This block holds GLOBAL bindings that apply across all projects.
  #   - Per-project sync/admin grants live in AppProject.spec.roles instead
  #     (see projects/uat-project.yaml). ArgoCD OR-merges both layers.
  #
  # Built-in roles (don't redefine):
  #   - role:admin     → full access to everything
  #   - role:readonly  → universal `get`
  rbac:
    # Default role for any authenticated user (SSO or local). role:readonly
    # gives them read-only browsing across the UI.
    policy.default: role:readonly

    policy.csv: |
      # === Group → role bindings ===
      # devops-team: superuser across all projects.
      g, devops-team, role:admin

      # developer-team: no global binding here. They get read-only via
      # policy.default; UAT sync rights come from projects/uat-project.yaml
      # (role: developer). Prod stays read-only (no project-level grant added).

      # === Local account bindings ===
      # The 'viewer' local account exists for break-glass / smoke-test logins;
      # role:readonly is plenty — no separate custom role needed.
      g, viewer, role:readonly

  # Credential template for GitHub repositories
  # Helm creates the secret with url and username only.
  # After install/upgrade, patch the secret to add the GitHub PAT (see README Step 6).
  credentialTemplates:
    github:
      url: https://github.com/logic3579
      username: logic3579

  # Repository definitions (credentials inherited from credential template above)
  repositories:
    helm-charts:
      url: https://github.com/logic3579/helm-charts
      name: helm-charts
      type: git

  # Secret configuration
  secret:
    # Create argocd-secret
    createSecret: true

    # GitHub webhook secret (optional)
    # githubSecret: <webhook-secret>

## Application Set Controller
applicationSet:
  enabled: true

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

## Extra objects to deploy (VirtualService will be in separate file)
extraObjects: []
