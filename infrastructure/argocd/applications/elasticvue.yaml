# Explicit ArgoCD Application for elasticvue on the mgmt cluster.
#
# mgmt is the cluster ArgoCD itself runs on. Unlike uat/prod (which run via
# the `infrastructure/app/*` ApplicationSets), mgmt-tier components are
# wired as explicit `Application` resources so each can be sized,
# scheduled, and synced independently.
#
# This is a multi-source Application:
#   1. Chart source — in-repo `charts/elasticvue` (renders the chart).
#   2. Values ref   — same repo, provides $values for the per-env override.
#
# Usage:
#   # Edit the file to replace placeholders with actual values, then:
#   kubectl apply -f elasticvue.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticvue-mgmt
  namespace: argocd
  labels:
    environment: mgmt
    app.kubernetes.io/part-of: example
  finalizers:
    - argocd.argoproj.io/resources-finalizer
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack-webhook: ""
    notifications.argoproj.io/subscribe.on-sync-failed.slack-webhook: ""
    notifications.argoproj.io/subscribe.on-health-degraded.slack-webhook: ""
    notifications.argoproj.io/subscribe.on-sync-running.slack-webhook: ""
spec:
  project: example-mgmt

  sources:
    # 1) Chart source — in-repo chart at charts/elasticvue.
    - repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
      targetRevision: main
      path: charts/elasticvue
      helm:
        valueFiles:
          # Chart defaults (relative to the chart path).
          - values.yaml
          # mgmt overrides — same file used by the standalone helm fallback in
          # infrastructure/mgmt/README.md, so ArgoCD and helm render identically.
          - $values/infrastructure/mgmt/elasticvue-values.yaml
        # The shared values file is required — fail loudly if it's missing.
        ignoreMissingValueFiles: false

    # 2) Values ref — this repo. NOT rendered; only resolves $values.
    - repoURL: https://github.com/<YOUR_ORG>/<YOUR_REPO>.git
      targetRevision: main
      ref: values

  destination:
    name: mgmt-cluster
    namespace: mgmt

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /secrets
