apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: app-producer
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: app.events
          patternType: literal
        operations:
          - Describe
          - Write
        host: "*"
      - resource:
          type: cluster
        operations:
          - IdempotentWrite
        host: "*"

