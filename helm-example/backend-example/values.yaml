# Example values for deploying a Java backend using charts/go-app.
#
# Usage:
#   helm install backend-example ../charts/go-app -f values.yaml
#
# Application startup logic (JVM flags, entrypoint) should live in the Docker image,
# not in Helm chart ConfigMaps.

replicaCount: 1

image:
  repository: harbor.example.com/project/backend-example
  tag: "v1"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-secret

nameOverride: "backend-example"

serviceAccount:
  create: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

# Use startupProbe instead of initialDelaySeconds: 120
# startupProbe:
#   httpGet:
#     path: /actuator/health
#     port: http
#   failureThreshold: 30
#   periodSeconds: 5

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 120
  periodSeconds: 15
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 120
  periodSeconds: 15
  timeoutSeconds: 3

resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

env:
  - name: APP_NAME
    value: "backend-example"
  - name: TZ
    value: "UTC"
  - name: JAVA_OPTS
    value: "-XX:InitialRAMPercentage=60.0 -XX:MaxRAMPercentage=90.0 -XX:+UseG1GC -XX:+UseContainerSupport"

ingress:
  enabled: false

virtualservice:
  enabled: false

podDisruptionBudget:
  enabled: false

nodeSelector:
  tier: app
