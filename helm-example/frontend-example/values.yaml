# Example values for deploying a frontend app using charts/frontend-app.
#
# Usage:
#   helm install frontend-example ../charts/frontend-app -f values.yaml
#
# nginx config is now handled by the chart's built-in nginxConfig feature,
# eliminating the need for a separate global chart.

replicaCount: 1

image:
  repository: harbor.example.com/frontend/frontend-example
  tag: "p1.7.8"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-secret

nameOverride: "frontend-example"

serviceAccount:
  create: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

livenessProbe:
  httpGet:
    path: /index.html
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /index.html
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 3

resources:
  requests:
    cpu: 10m
    memory: 50Mi
  limits:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

nginxConfig:
  enabled: true
  customConf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

env:
  - name: TZ
    value: "UTC"

ingress:
  enabled: false

virtualservice:
  enabled: true
  gateways:
    - istio-ingress/external-gateway
  hosts:
    - www.example.com
  port: 80

podDisruptionBudget:
  enabled: false

nodeSelector:
  tier: app
